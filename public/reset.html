<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - KITAAB_FAROOSH</title>
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { background-color: var(--bg-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        .reset-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .reset-header { text-align: center; margin-bottom: 32px; }
        .reset-header img { height: 60px; margin-bottom: 16px; }
        .reset-header h2 { font-size: 24px; color: var(--primary); font-weight: 800; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--primary); text-transform: uppercase; }
        
        .auth-input {
            width: 100%; padding: 14px 16px; border: 1px solid var(--border-light);
            border-radius: 4px; font-size: 15px; outline: none; transition: var(--transition);
        }
        .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }

        .btn-auth {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 4px; font-size: 16px; font-weight: 800;
            cursor: pointer; transition: var(--transition); margin-top: 10px;
        }
        .btn-auth:hover { background: #003d43; transform: translateY(-1px); }

        .status-msg {
            margin-top: 24px; padding: 16px; border-radius: 4px; text-align: center;
            font-weight: 700; font-size: 14px; display: none;
        }
        .status-msg.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .status-msg.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }

        .back-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }
        .back-link a {
            color: var(--secondary);
            font-weight: 700;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="reset-header">
            <img src="/assets/logo.png" alt="Logo">
            <h2 id="resetTitle">Set a New Password</h2>
        </div>
        
        <div id="message" class="status-msg"></div>

        <!-- Step 1: Email Input -->
        <div id="step1">
            <form id="email-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="auth-input" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="btn-auth">Send OTP</button>
            </form>
            <div class="back-link">
                <a href="/index.html">← Back to Login</a>
            </div>
        </div>

        <!-- Step 2: OTP Input -->
        <div id="step2" style="display: none;">
            <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">We've sent a 6-digit code to your email</p>
            <form id="otp-form">
                <div class="form-group">
                    <label for="otp">Enter OTP</label>
                    <input type="text" id="otp" class="auth-input" placeholder="Enter 6-digit OTP" maxlength="6" required>
                </div>
                <button type="submit" class="btn-auth">Verify OTP</button>
            </form>
            <div class="back-link">
                <a href="#" onclick="goToStep1()">Change Email</a>
            </div>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3" style="display: none;">
            <form id="password-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" class="auth-input" placeholder="Min 8 chars, 1 uppercase, 1 lowercase" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" class="auth-input" placeholder="Repeat new password" required>
                </div>
                
                <button type="submit" class="btn-auth">Reset Password</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const messageEl = document.getElementById('message');
            let resetEmail = '';
            let verifiedOtp = '';

            // Check if redirected with token (legacy support)
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const email = params.get('email');

            if (token && email) {
                // Legacy: if coming from old reset link, go directly to password reset
                resetEmail = email;
                verifiedOtp = token; // Treat token as OTP
                goToStep(3);
            }

            function goToStep(step) {
                document.getElementById('step1').style.display = step === 1 ? 'block' : 'none';
                document.getElementById('step2').style.display = step === 2 ? 'block' : 'none';
                document.getElementById('step3').style.display = step === 3 ? 'block' : 'none';
                
                if (step === 3) {
                    document.getElementById('resetTitle').textContent = 'Set a New Password';
                } else if (step === 2) {
                    document.getElementById('resetTitle').textContent = 'Verify OTP';
                } else {
                    document.getElementById('resetTitle').textContent = 'Reset Password';
                }
            }

            function goToStep1() {
                goToStep(1);
                document.getElementById('email-form').reset();
                messageEl.style.display = 'none';
                resetEmail = '';
            }

            // Step 1: Send OTP
            document.getElementById('email-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                resetEmail = document.getElementById('email').value;
                messageEl.style.display = 'none';
                messageEl.className = 'status-msg';

                try {
                    const response = await fetch('/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: resetEmail })
                    });

                    const result = await response.json();

                    if (result.success) {
                        messageEl.textContent = 'OTP sent! Check your email.';
                        messageEl.style.display = 'block';
                        messageEl.classList.add('success');
                        setTimeout(() => goToStep(2), 1000);
                    } else {
                        messageEl.textContent = result.message || 'Failed to send OTP.';
                        messageEl.style.display = 'block';
                        messageEl.classList.add('error');
                    }
                } catch (error) {
                    messageEl.textContent = 'Connection error. Please try again.';
                    messageEl.style.display = 'block';
                    messageEl.classList.add('error');
                }
            });

            // Step 2: Verify OTP
            document.getElementById('otp-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const otp = document.getElementById('otp').value;
                messageEl.style.display = 'none';
                messageEl.className = 'status-msg';

                try {
                    const response = await fetch('/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: resetEmail, otp })
                    });

                    const result = await response.json();

                    if (result.success) {
                        verifiedOtp = otp;
                        goToStep(3);
                    } else {
                        messageEl.textContent = result.message || 'Invalid OTP.';
                        messageEl.style.display = 'block';
                        messageEl.classList.add('error');
                    }
                } catch (error) {
                    messageEl.textContent = 'Connection error. Please try again.';
                    messageEl.style.display = 'block';
                    messageEl.classList.add('error');
                }
            });

            // Step 3: Reset Password
            document.getElementById('password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const newPassword = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                messageEl.style.display = 'none';
                messageEl.className = 'status-msg';

                if (newPassword !== confirmPassword) {
                    messageEl.textContent = 'Passwords do not match!';
                    messageEl.style.display = 'block';
                    messageEl.classList.add('error');
                    return;
                }

                const strong = newPassword.length >= 8 && /[A-Z]/.test(newPassword) && /[a-z]/.test(newPassword);
                if (!strong) {
                    messageEl.textContent = 'Password must be at least 8 chars with uppercase and lowercase.';
                    messageEl.style.display = 'block';
                    messageEl.classList.add('error');
                    return;
                }

                try {
                    const response = await fetch('/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: resetEmail, otp: verifiedOtp, newPassword })
                    });

                    const result = await response.json();

                    if (response.ok || result.success) {
                        messageEl.textContent = result.message || 'Password reset successful!';
                        messageEl.style.display = 'block';
                        messageEl.classList.add('success');
                        document.getElementById('password-form').style.display = 'none';
                        document.getElementById('resetTitle').textContent = 'Password Reset!';
                        setTimeout(() => { window.location.href = '/index.html?mode=login'; }, 3000);
                    } else {
                        messageEl.textContent = result.message || 'An error occurred.';
                        messageEl.style.display = 'block';
                        messageEl.classList.add('error');
                    }
                } catch (error) {
                    messageEl.textContent = 'Connection error. Please try again.';
                    messageEl.style.display = 'block';
                    messageEl.classList.add('error');
                }
            });
        });
    </script>
  <!-- Footer placeholder for universal footer injection -->
  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>
</body>
</html>
