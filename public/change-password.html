<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Change Password — Kitaab Faroosh</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .change-container { margin: 60px auto 100px; max-width: 500px; }
    
    .change-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }

    .change-header { text-align: center; margin-bottom: 32px; }
    .change-header h1 { font-size: 24px; margin-bottom: 8px; color: var(--primary); }
    .change-header p { color: var(--text-muted); font-size: 14px; }

    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 8px; color: var(--primary); }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-size: 15px;
      outline: none;
      transition: var(--transition);
    }

    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }

    .btn-save {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-save:hover { background: #003d43; transform: translateY(-2px); }
    .btn-save:disabled { background: var(--text-light); cursor: not-allowed; transform: none; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--secondary);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }

    .msg-box {
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      display: none;
    }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-err { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <script src="/js/navbar.js" defer></script>

  <main class="container change-container">
    <div class="change-card">
      <div class="change-header">
        <h1>🔒 Change Password</h1>
        <p>Update your account security credentials.</p>
      </div>
      
      <div id="msg" class="msg-box"></div>
      
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" class="form-input" placeholder="Min 8 characters" />
      </div>
      
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat new password" />
      </div>

      <button id="saveBtn" class="btn-save">Update Password</button>
      <a href="/my-profile.html" class="back-link">← Back to Dashboard</a>
    </div>
  </main>

  <script>
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const btn = document.getElementById('saveBtn');
      const msg = document.getElementById('msg');
      const pass = document.getElementById('newPassword').value;
      const conf = document.getElementById('confirmPassword').value;
      
      msg.style.display = 'none';
      msg.className = 'msg-box';

      if (!pass || pass.length < 8) {
        msg.style.display = 'block'; 
        msg.classList.add('msg-err');
        msg.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (pass !== conf) {
        msg.style.display = 'block'; 
        msg.classList.add('msg-err');
        msg.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const r = await fetch('/api/profile/me', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword: pass })
        });
        const d = await r.json();
        if (d.success) {
          msg.style.display = 'block'; 
          msg.classList.add('msg-ok');
          msg.textContent = 'Password updated successfully!';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
        } else {
          msg.style.display = 'block'; 
          msg.classList.add('msg-err');
          msg.textContent = d.error || 'Update failed.';
        }
      } catch (e) {
        msg.style.display = 'block'; 
        msg.classList.add('msg-err');
        msg.textContent = 'Connection error.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
  <!-- Footer placeholder; populated by the universal footer script -->
  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>
</body>
</html>
