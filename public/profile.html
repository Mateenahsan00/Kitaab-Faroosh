<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Seller Profile — Kitaab Faroosh</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .profile-hero {
      background: var(--white);
      padding: 60px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .hero-flex {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .hero-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg-main);
      box-shadow: var(--shadow-md);
      background: #eee;
    }

    .hero-info h1 { font-size: 32px; margin-bottom: 8px; }
    
    .hero-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
    }

    .hero-actions { display: flex; gap: 12px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: -30px auto 40px;
      position: relative;
      z-index: 10;
    }

    .stat-card {
      background: var(--white);
      padding: 24px;
      border-radius: 4px;
      border: 1px solid var(--border-light);
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    .stat-num { font-size: 28px; font-weight: 800; color: var(--primary); display: block; }
    .stat-label { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

    .section-title { font-size: 22px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-light); }

    @media (max-width: 768px) {
      .hero-flex { flex-direction: column; text-align: center; }
      .hero-meta { justify-content: center; flex-wrap: wrap; }
      .hero-actions { justify-content: center; }
      .stats-row { grid-template-columns: 1fr; margin-top: 20px; }
    }
  </style>
</head>
<body>
  <script src="/js/navbar.js" defer></script>

  <section class="profile-hero">
    <div class="container" id="heroSection">
      <!-- Skeleton Hero -->
      <div class="hero-flex">
        <div style="width:120px; height:120px; border-radius:50%; background:#eee;"></div>
        <div style="flex:1">
          <div style="width:200px; height:32px; background:#eee; margin-bottom:12px;"></div>
          <div style="width:150px; height:20px; background:#eee;"></div>
        </div>
      </div>
    </div>
  </section>

  <main class="container" style="padding-bottom: 80px;">
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <span class="stat-num">—</span>
        <span class="stat-label">Active Ads</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">—</span>
        <span class="stat-label">Member Since</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">—</span>
        <span class="stat-label">Location</span>
      </div>
    </div>

    <h2 class="section-title">Seller's Inventory</h2>
    
    <div id="adsGrid" class="items-grid">
      <!-- Skeleton Grid -->
      <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
        <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--secondary);"></i>
      </div>
    </div>
  </main>

  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    function esc(s) { return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    
    (async () => {
      const params = new URLSearchParams(location.search);
      const sellerId = params.get('id');
      if (!sellerId) { location.href = '/home.html'; return; }

      try {
        const [profileRes, sessionRes] = await Promise.all([
          fetch(`/api/users/${sellerId}/public-profile`),
          fetch('/session')
        ]);
        const profileData = await profileRes.json();
        const sessionData = await sessionRes.json();

        if (!profileData.success) {
          document.body.innerHTML = `<div class="container text-center" style="padding:100px 0;"><h1>Seller Not Found</h1><a href="/" class="btn btn-primary">Back Home</a></div>`;
          return;
        }

        const user = profileData.user;
        const items = profileData.items || [];
        const isMe = sessionData.loggedIn && sessionData.user.id == sellerId;
        const avatar = user.profile_pic || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(user.full_name)}`;
        const joinYear = user.member_since ? new Date(user.member_since).getFullYear() : '2026';

        // Render Hero
        document.getElementById('heroSection').innerHTML = `
          <div class="hero-flex">
            <img class="hero-avatar" src="${avatar}" alt="${esc(user.full_name)}">
            <div class="hero-info">
              <h1>${esc(user.full_name)}</h1>
              <div class="hero-meta">
                <span><i class="fas fa-map-marker-alt"></i> ${esc(user.city || 'Pakistan')}</span>
                <span><i class="fas fa-calendar-alt"></i> Joined in ${joinYear}</span>
                <span><i class="fas fa-shopping-bag"></i> ${items.length} Ads</span>
              </div>
              <div class="hero-actions">
                ${!isMe ? `<button class="btn btn-primary" onclick="location.href='/my-chats.html?to=${sellerId}'"><i class="fas fa-comments"></i> Chat with Seller</button>` : ''}
                <button class="btn btn-outline" id="shareBtn"><i class="fas fa-share-alt"></i> Share Profile</button>
              </div>
            </div>
          </div>
        `;

        // Render Stats
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-card">
            <span class="stat-num">${items.length}</span>
            <span class="stat-label">Active Ads</span>
          </div>
          <div class="stat-card">
            <span class="stat-num">${joinYear}</span>
            <span class="stat-label">Member Since</span>
          </div>
          <div class="stat-card">
            <span class="stat-num">${esc(user.city || 'Pakistan')}</span>
            <span class="stat-label">Location</span>
          </div>
        `;

        // Share Logic
        document.getElementById('shareBtn').onclick = () => {
          navigator.clipboard.writeText(location.href);
          alert('Profile link copied to clipboard!');
        };

        // Render Grid
        const grid = document.getElementById('adsGrid');
        if (items.length === 0) {
          grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;"><h3>No active ads from this seller</h3></div>`;
        } else {
          grid.innerHTML = items.map(i => {
            const img = (i.images && i.images.length) ? i.images[0] : '';
            return `
              <div class="item-card" onclick="location.href='/item-detail.html?id=${i.id}'">
                <div class="item-img-wrap">
                  ${img ? `<img src="${img}">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:40px;color:#ddd;"><i class="fas fa-camera"></i></div>'}
                </div>
                <div class="item-info">
                  <div class="item-price">Rs ${Number(i.price).toLocaleString()}</div>
                  <div class="item-title">${esc(i.title)}</div>
                  <div class="item-location-date">
                    <span><i class="fas fa-map-marker-alt"></i> ${esc(i.city || 'Pakistan')}</span>
                  </div>
                </div>
              </div>
            `;
          }).join('');
        }

      } catch (e) {
        console.error(e);
      }
    })();
  </script>
</body>
</html>
