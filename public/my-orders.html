<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>My Orders — Kitaab Faroosh</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .orders-container { margin: 40px auto; padding-bottom: 80px; }
    
    .orders-header { margin-bottom: 32px; }
    .orders-header h1 { font-size: 28px; margin-bottom: 8px; }
    .orders-header p { color: var(--text-muted); }

    .orders-list { display: flex; flex-direction: column; gap: 20px; }

    .order-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: var(--transition);
    }

    .order-card:hover { box-shadow: var(--shadow-md); }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--bg-main);
      padding-bottom: 12px;
    }

    .order-id { font-weight: 800; color: var(--primary); font-size: 14px; }
    
    .order-status {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .status-pending { background: #fffaf0; color: #9c4221; border: 1px solid #feebc8; }
    .status-accepted, .status-approved { background: #e6fffa; color: #2c7a7b; border: 1px solid #b2f5ea; }
    .status-delivered { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
    .status-rejected { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }

    .order-body { display: flex; gap: 20px; align-items: center; }
    .order-item-img { width: 100px; height: 100px; border-radius: 6px; object-fit: cover; background: #f8f9fa; }
    .order-item-info { flex: 1; min-width: 0; }
    .order-item-title { font-weight: 700; color: var(--primary); font-size: 16px; margin-bottom: 4px; }
    .order-seller { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .order-price { font-weight: 800; color: var(--secondary); font-size: 20px; }

    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--bg-main);
      font-size: 13px;
      color: var(--text-light);
    }

    .btn-chat {
      padding: 8px 16px;
      background: #f0f2f3;
      color: var(--primary);
      border: none;
      border-radius: 4px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .empty-orders {
      text-align: center;
      padding: 80px 20px;
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
    }

    @media (max-width: 600px) {
      .order-body { flex-direction: column; align-items: flex-start; }
      .order-item-img { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>
  <script src="/js/navbar.js" defer></script>

  <main class="container orders-container">
    <div class="orders-header">
      <h1>My Purchases</h1>
      <p>Track your orders and contact sellers</p>
    </div>

    <div id="ordersList" class="orders-list">
      <!-- Loading Spinner -->
      <div class="text-center" style="padding: 40px;">
        <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--secondary);"></i>
      </div>
    </div>
  </main>

  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

    async function loadMyOrders() {
      const list = document.getElementById('ordersList');
      try {
        const r = await fetch('/api/buyer/orders');
        const d = await r.json();
        
        if (!d.success) {
          if (r.status === 401) location.href = '/index.html';
          return;
        }

        const orders = d.orders || [];
        if (orders.length === 0) {
          list.innerHTML = `
            <div class="empty-orders">
              <i class="fas fa-shopping-bag" style="font-size:64px; color:var(--border-light); margin-bottom:24px;"></i>
              <h3>You haven't bought anything yet</h3>
              <p style="margin-bottom:24px;">Explore thousands of student-listed items at great prices.</p>
              <a href="/home.html" class="btn btn-primary">Browse Marketplace</a>
            </div>
          `;
          return;
        }

        list.innerHTML = orders.map(order => {
          const item = order.items[0] || {};
          const img = (item.images && item.images.length) ? item.images[0] : '/assets/placeholder.jpg';
          const status = order.status || 'pending';
          const displayStatus = status === 'accepted' ? 'APPROVED' : status.toUpperCase();
          const statusClass = status === 'accepted' ? 'status-approved' : `status-${status.toLowerCase()}`;
          const date = new Date(order.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
          
          return `
            <div class="order-card">
              <div class="order-header">
                <div class="order-id">ORDER #${order.id}</div>
                <span class="order-status ${statusClass}">${displayStatus}</span>
              </div>
              
              <div class="order-body">
                <img src="${esc(img)}" class="order-item-img" onerror="this.src='/assets/placeholder.jpg'">
                <div class="order-item-info">
                  <div class="order-item-title">${esc(item.title)}</div>
                  <div class="order-seller">Sold by <strong>${esc(order.seller_name)}</strong></div>
                  <div class="order-price">Rs ${Number(order.total_price).toLocaleString()}</div>
                </div>
                <button class="btn-chat" onclick="location.href='/my-chats.html?to=${order.seller_id}&item=${item.item_id}'">
                  <i class="fas fa-comments"></i> Chat with Seller
                </button>
              </div>

              <div class="order-footer">
                <span><i class="far fa-calendar-alt"></i> Ordered on ${date}</span>
                <span><i class="fas fa-map-marker-alt"></i> Shipping to ${esc(order.city)}</span>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        list.innerHTML = '<div class="empty-orders"><h3>Error loading orders</h3></div>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadMyOrders);
  </script>
</body>
</html>
