<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Edit Profile — Kitaab Faroosh</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .edit-container { margin: 60px auto 100px; max-width: 800px; }
    
    .edit-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }

    .edit-header { text-align: center; margin-bottom: 40px; }
    .edit-header h1 { font-size: 28px; margin-bottom: 8px; }
    .edit-header p { color: var(--text-muted); }

    .avatar-edit-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      padding-bottom: 40px;
      border-bottom: 2px solid var(--bg-main);
    }

    .avatar-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg-main);
      box-shadow: var(--shadow-sm);
    }

    .btn-upload {
      padding: 8px 16px;
      background: var(--bg-main);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-upload:hover { background: var(--border-light); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .form-group { margin-bottom: 0; }
    .form-group label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 8px; color: var(--primary); }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-size: 15px;
      outline: none;
      transition: var(--transition);
    }

    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
    .form-input[readonly] { background: #f8f9fa; cursor: default; }

    .msg-box {
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      display: none;
    }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-err { background: #ffebee; color: #c62828; }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <script src="/js/navbar.js" defer></script>

  <main class="container edit-container">
    <div class="edit-card">
      <div class="edit-header">
        <h1>Edit My Profile</h1>
        <p>Update your personal information and preferences.</p>
      </div>

      <div id="msg" class="msg-box"></div>

      <div class="avatar-edit-box">
        <img id="avatar" class="avatar-preview" src="/assets/placeholder.jpg">
        <label for="file" class="btn-upload">Change Photo</label>
        <input id="file" type="file" accept="image/*" style="display:none">
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input id="full_name" type="text" class="form-input" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email (Read-only)</label>
          <input id="email" type="email" class="form-input" readonly>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input id="new_password" type="password" class="form-input" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input id="confirm_password" type="password" class="form-input" placeholder="••••••••">
        </div>
      </div>

      <button id="save" class="btn btn-primary" style="width:100%; margin-top:40px; padding:16px;">
        Save All Changes
      </button>
    </div>
  </main>

  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    function toDataURL(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file);});}
    
    async function loadMe(){
      try {
        const r = await fetch('/api/profile/me');
        const d = await r.json();
        if(d.success){
          const u = d.user;
          document.getElementById('full_name').value = u.full_name || '';
          document.getElementById('email').value = u.email || '';
          document.getElementById('avatar').src = u.profile_pic || (`https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(u.full_name)}`);
        }
      } catch(e) {}
    }

    document.getElementById('file').onchange = async (e) => {
      const f = e.target.files[0];
      if(f) document.getElementById('avatar').src = await toDataURL(f);
    };

    document.getElementById('save').onclick = async () => {
      const msg = document.getElementById('msg');
      const pwd = document.getElementById('new_password').value;
      const conf = document.getElementById('confirm_password').value;

      if(pwd && pwd !== conf){
        msg.textContent = 'Passwords do not match.';
        msg.className = 'msg-box msg-err';
        msg.style.display = 'block';
        return;
      }

      const body = {
        full_name: document.getElementById('full_name').value.trim()
      };
      
      const file = document.getElementById('file').files[0];
      if(file) body.profile_pic = await toDataURL(file);
      if(pwd) body.newPassword = pwd;

      try {
        const r = await fetch('/api/profile/me', {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        const d = await r.json();
        if(d.success){
          msg.textContent = 'Profile updated successfully!';
          msg.className = 'msg-box msg-ok';
          msg.style.display = 'block';
          setTimeout(() => msg.style.display = 'none', 3000);
        } else {
          msg.textContent = d.error || 'Update failed.';
          msg.className = 'msg-box msg-err';
          msg.style.display = 'block';
        }
      } catch(e) {}
    };

    document.addEventListener('DOMContentLoaded', loadMe);
  </script>
</body>
</html>
