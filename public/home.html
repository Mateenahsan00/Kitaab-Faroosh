<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kitaab Faroosh — Pakistan's Professional Campus Marketplace</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" sizes="128x128" href="/assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    /* Hero Section Specifics */
    .hero-banner {
      background: linear-gradient(rgba(0, 47, 52, 0.7), rgba(0, 47, 52, 0.7)), url('/banner.png');
      background-size: cover;
      background-position: center;
      padding: 80px 0;
      text-align: center;
      color: white;
    }

    .hero-banner h1 {
      color: white;
      font-size: 48px;
      margin-bottom: 24px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    /* Category Quick Links */
    .cat-bar {
      background: var(--white);
      padding: 20px 0;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 32px;
    }

    .cat-list {
      display: flex;
      justify-content: center;
      gap: 40px;
      overflow-x: auto;
      padding: 10px 0;
    }

    .cat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      min-width: 80px;
    }

    .cat-icon {
      width: 56px;
      height: 56px;
      background: #f8f9fa;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: var(--transition);
    }

    .cat-item:hover .cat-icon {
      background: var(--accent);
      transform: scale(1.1);
    }

    .section-title {
      margin-bottom: 24px;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Favorites button style update */
    .fav-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      color: var(--text-light);
      transition: var(--transition);
      z-index: 10;
    }

    .fav-btn:hover { transform: scale(1.1); }
    .fav-btn.active { color: #ff5a5f; }

  </style>
</head>
<body>
  <!-- Scripts -->
  <script src="/js/navbar.js" defer></script>
  <script src="/js/pakistan-cities.js" defer></script>
  <script src="/js/item-filters.js" defer></script>

  <!-- Hero Section -->
  <section class="hero-banner">
    <div class="container">
      <h1>Find Books & Study Gear on Your Campus</h1>
      <div id="filterMount"></div>
    </div>
  </section>

  <!-- Category Bar -->
  <div class="cat-bar">
    <div class="container">
      <div class="cat-list">
        <a href="/home.html?institution=University" class="cat-item">
          <div class="cat-icon">🎓</div>
          <span>University</span>
        </a>
        <a href="/home.html?institution=College" class="cat-item">
          <div class="cat-icon">🏫</div>
          <span>College</span>
        </a>
        <a href="/home.html?institution=School" class="cat-item">
          <div class="cat-icon">🎒</div>
          <span>School</span>
        </a>
        <a href="/home.html?category=Books" class="cat-item">
          <div class="cat-icon">📚</div>
          <span>Books</span>
        </a>
        <a href="/home.html?category=Notes" class="cat-item">
          <div class="cat-icon">📝</div>
          <span>Notes</span>
        </a>
        <a href="/home.html?category=Accessories" class="cat-item">
          <div class="cat-icon">📎</div>
          <span>Stationery</span>
        </a>
      </div>
    </div>
  </div>

  <main class="container" style="padding-bottom: 60px;">
    <!-- Latest Items -->
    <section class="mt-20">
      <div class="section-title">
        <h2>Fresh Recommendations</h2>
        <a href="/home.html" style="font-size: 14px; font-weight: 700; color: var(--secondary); text-decoration: underline;">View all</a>
      </div>
      <div id="itemsGrid" class="items-grid">
        <!-- Skeleton Loaders or Empty State Injected by JS -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    let userFavoriteIds = [];

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function getTimeAgo(dateString) {
      const now = new Date();
      const posted = new Date(dateString);
      const diffMs = now - posted;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 60) return diffMins <= 1 ? 'Just now' : `${diffMins}m ago`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h ago`;
      const diffDays = Math.floor(diffHours / 24);
      if (diffDays < 30) return `${diffDays}d ago`;
      return posted.toLocaleDateString();
    }

    async function fetchUserFavorites() {
      try {
        const res = await fetch('/api/favorites/check');
        const data = await res.json();
        if (data.success) userFavoriteIds = data.favoriteIds || [];
      } catch (e) { console.error('Favorites fetch failed', e); }
    }

    function renderItemsGrid(items) {
      const grid = document.getElementById('itemsGrid');
      if (!grid) return;
      if (items.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 80px 0;">
            <i class="fas fa-search" style="font-size: 48px; color: var(--border-light); margin-bottom: 16px;"></i>
            <h3 style="color: var(--text-muted);">No items found</h3>
            <p style="color: var(--text-light);">Try adjusting your filters or search terms.</p>
          </div>`;
        return;
      }

      grid.innerHTML = items.map(i => {
        const img = (Array.isArray(i.images) && i.images[0]) || '';
        const price = Number(i.price || 0).toLocaleString();
        const isFav = userFavoriteIds.includes(i.id);
        
        return `
          <div class="item-card" onclick="if(!event.target.closest('.fav-btn')) window.location.href='/item-detail.html?id=${i.id}'">
            <div class="item-img-wrap">
              ${img ? `<img src="${img}" alt="${escapeHtml(i.title)}">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:40px;color:#ddd;"><i class="fas fa-camera"></i></div>'}
              <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, ${i.id})">
                <i class="${isFav ? 'fas fa-heart' : 'far fa-heart'}"></i>
              </button>
            </div>
            <div class="item-info">
              <div class="item-price">Rs ${price}</div>
              <div class="item-title">${escapeHtml(i.title)}</div>
              <div class="item-location-date">
                <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(i.city || 'Pakistan')}</span>
                <span>${getTimeAgo(i.datePosted)}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function toggleFavorite(event, itemId) {
      event.preventDefault();
      event.stopPropagation();
      const btn = event.currentTarget;
      const icon = btn.querySelector('i');
      const isCurrentlyFav = btn.classList.contains('active');
      
      try {
        const url = isCurrentlyFav ? `/api/favorites/${itemId}` : '/api/favorites';
        const method = isCurrentlyFav ? 'DELETE' : 'POST';
        const r = await fetch(url, { 
          method, 
          headers: {'Content-Type':'application/json'},
          body: isCurrentlyFav ? null : JSON.stringify({ item_id: itemId })
        });
        const d = await r.json();
        
        if (d.success) {
          btn.classList.toggle('active');
          icon.className = btn.classList.contains('active') ? 'fas fa-heart' : 'far fa-heart';
          if (isCurrentlyFav) userFavoriteIds = userFavoriteIds.filter(id => id !== itemId);
          else userFavoriteIds.push(itemId);
        } else if (r.status === 401) {
          alert('Please login to save favorites');
        }
      } catch (e) { console.error('Favorite toggle failed', e); }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      await fetchUserFavorites();
      if (window.initFilters) {
        window.initFilters('filterMount', '', renderItemsGrid);
      }
    });
  </script>
</body>
</html>
