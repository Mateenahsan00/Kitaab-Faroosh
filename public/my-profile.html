<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>My Dashboard — Kitaab Faroosh</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .dashboard-container { margin: 40px auto; padding-bottom: 80px; }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* Sidebar Profile Card */
    .profile-sidebar {
      background: var(--white);
      border-radius: 4px;
      border: 1px solid var(--border-light);
      padding: 32px;
      text-align: center;
    }

    .avatar-box {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg-main);
    }

    .upload-avatar-btn {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid white;
      transition: var(--transition);
    }

    .upload-avatar-btn:hover { transform: scale(1.1); }

    .user-info h2 { font-size: 20px; margin-bottom: 4px; }
    .user-info p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

    .nav-menu {
      border-top: 1px solid var(--border-light);
      padding-top: 24px;
      text-align: left;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      color: var(--primary);
      font-weight: 600;
      font-size: 15px;
      border-radius: 4px;
      transition: var(--transition);
    }

    .nav-item:hover { background: var(--bg-main); }
    .nav-item.active { background: var(--primary); color: white; }

    /* Main Dashboard Area */
    .dashboard-main { display: flex; flex-direction: column; gap: 24px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 24px;
      text-align: center;
      transition: var(--transition);
    }

    .stat-card:hover { border-color: var(--secondary); box-shadow: var(--shadow-md); }
    .stat-value { font-size: 32px; font-weight: 800; color: var(--primary); display: block; }
    .stat-label { font-size: 13px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

    .details-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 32px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--bg-main);
    }

    .card-header h3 { font-size: 20px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .form-group { margin-bottom: 0; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-light); margin-bottom: 8px; }
    
    .profile-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-size: 15px;
      background: #f8f9fa;
      transition: var(--transition);
    }

    .profile-input:focus { border-color: var(--primary); background: white; outline: none; }
    .profile-input[readonly] { cursor: default; }

    .btn-edit {
      padding: 8px 16px;
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-edit:hover { background: var(--primary); color: white; }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 800;
      margin-top: 32px;
      cursor: pointer;
      display: none;
    }

    @media (max-width: 900px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <script src="/js/navbar.js" defer></script>

  <main class="container dashboard-container">
    <div class="dashboard-grid">
      <!-- Sidebar -->
      <aside class="profile-sidebar">
        <div class="avatar-box">
          <img id="avatar" class="avatar-img" src="/assets/placeholder.jpg" alt="Profile Picture">
          <label for="fileInput" class="upload-avatar-btn">
            <i class="fas fa-camera"></i>
          </label>
          <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>
        <div class="user-info">
          <h2 id="dispName">Loading...</h2>
          <p id="dispEmail">Loading...</p>
        </div>
        
        <nav class="nav-menu">
          <a href="/my-profile.html" class="nav-item active">
            <i class="fas fa-user-circle"></i> My Profile
          </a>
          <a href="/my-ads.html" class="nav-item">
            <i class="fas fa-bullhorn"></i> My Ads
          </a>
          <a href="/favorites.html" class="nav-item">
            <i class="fas fa-heart"></i> Favorites
          </a>
          <a href="/my-chats.html" class="nav-item">
            <i class="fas fa-comments"></i> Chats
            <span class="global-chat-badge" style="display:none;background:var(--danger);color:#fff;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;margin-left:auto;">0</span>
          </a>
          <a href="/cart.html" class="nav-item">
            <i class="fas fa-shopping-cart"></i> Cart
          </a>
          <a href="/change-password.html" class="nav-item" style="margin-top:20px; color:#ff5a5f;">
            <i class="fas fa-lock"></i> Security
          </a>
        </nav>
      </aside>

      <!-- Main Dashboard -->
      <div class="dashboard-main">
        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card">
            <span id="statAds" class="stat-value">0</span>
            <span class="stat-label">Active Ads</span>
          </div>
          <div class="stat-card">
            <span id="statFavs" class="stat-value">0</span>
            <span class="stat-label">Favorites</span>
          </div>
          <div class="stat-card">
            <span id="statCart" class="stat-value">0</span>
            <span class="stat-label">In Cart</span>
          </div>
        </div>

        <!-- Details -->
        <div class="details-card">
          <div class="card-header">
            <h3>Account Settings</h3>
            <button id="editToggle" class="btn-edit">Edit Profile</button>
          </div>

          <div id="msg" style="display:none; padding:12px; border-radius:4px; margin-bottom:24px; text-align:center; font-weight:700;"></div>

          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" class="profile-input" readonly>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" class="profile-input" readonly>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="phone" class="profile-input" placeholder="Not provided" readonly>
            </div>
            <div class="form-group">
              <label>City</label>
              <input type="text" id="city" class="profile-input" placeholder="Not provided" readonly>
            </div>
          </div>

          <button id="saveBtn" class="btn-save">Save Changes</button>
        </div>
      </div>
    </div>
  </main>

  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    let isEditing = false;
    let userData = null;

    async function loadStats() {
      try {
        const r = await fetch('/api/profile/stats');
        const d = await r.json();
        if (d.success) {
          document.getElementById('statAds').textContent = d.stats.adCount || 0;
          document.getElementById('statFavs').textContent = d.stats.favCount || 0;
          document.getElementById('statCart').textContent = d.stats.cartCount || 0;
        }
      } catch(e) {}
    }

    async function loadProfile() {
      try {
        const r = await fetch('/api/profile/me');
        const d = await r.json();
        if (!d.success) { location.href = '/index.html'; return; }
        
        userData = d.user;
        document.getElementById('dispName').textContent = userData.full_name;
        document.getElementById('dispEmail').textContent = userData.email;
        document.getElementById('avatar').src = userData.profile_pic || (`https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(userData.full_name)}`);
        
        document.getElementById('fullName').value = userData.full_name;
        document.getElementById('email').value = userData.email;
        document.getElementById('phone').value = userData.phone_number || '';
        document.getElementById('city').value = userData.city || '';
      } catch(e) {}
    }

    document.getElementById('editToggle').onclick = () => {
      isEditing = !isEditing;
      const inputs = document.querySelectorAll('.profile-input:not(#email)');
      inputs.forEach(i => {
        i.readOnly = !isEditing;
        i.style.background = isEditing ? 'white' : '#f8f9fa';
      });
      document.getElementById('saveBtn').style.display = isEditing ? 'block' : 'none';
      document.getElementById('editToggle').textContent = isEditing ? 'Cancel' : 'Edit Profile';
    };

    document.getElementById('saveBtn').onclick = async () => {
      const btn = document.getElementById('saveBtn');
      const msg = document.getElementById('msg');
      
      const body = {
        full_name: document.getElementById('fullName').value.trim(),
        phone_number: document.getElementById('phone').value.trim(),
        city: document.getElementById('city').value.trim()
      };
      
      btn.disabled = true;
      try {
        const r = await fetch('/api/profile/me', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if ((await r.json()).success) {
          msg.style.display = 'block';
          msg.style.background = '#e8f5e9';
          msg.style.color = '#2e7d32';
          msg.textContent = 'Profile updated successfully!';
          setTimeout(() => msg.style.display = 'none', 3000);
          document.getElementById('editToggle').click();
          loadProfile();
        }
      } catch(e) {}
      btn.disabled = false;
    };

    document.getElementById('fileInput').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('avatar', file);
      try {
        const r = await fetch('/api/user/me/avatar', { method: 'POST', body: fd });
        const d = await r.json();
        if (d.success) document.getElementById('avatar').src = d.profile_pic;
      } catch(e) {}
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadProfile();
      loadStats();
    });
  </script>
</body>
</html>
