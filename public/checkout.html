<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Checkout — Kitaab Faroosh</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .checkout-container { margin: 40px auto; padding-bottom: 80px; }
    
    .checkout-header { margin-bottom: 32px; }
    .checkout-header h1 { font-size: 28px; margin-bottom: 8px; }
    .checkout-header p { color: var(--text-muted); }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .checkout-section {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--bg-main);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
    
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-size: 15px;
      outline: none;
      transition: var(--transition);
    }

    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }

    /* Order Summary */
    .summary-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 24px;
      position: sticky;
      top: 100px;
    }

    .order-items { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
    .order-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--bg-main);
    }
    .order-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
    .order-item-info { flex: 1; min-width: 0; }
    .order-item-title { font-size: 14px; font-weight: 600; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-item-price { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
    .summary-total { margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--bg-main); font-weight: 800; font-size: 20px; color: var(--primary); }

    .btn-place-order {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 24px;
    }

    .btn-place-order:hover { background: #003d43; }
    .btn-place-order:disabled { background: #ccc; cursor: not-allowed; }

    /* Success Message */
    .success-container {
      text-align: center;
      padding: 80px 20px;
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      display: none;
    }

    @media (max-width: 900px) {
      .checkout-grid { grid-template-columns: 1fr; }
      .summary-card { position: static; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <script src="/js/navbar.js" defer></script>

  <main class="container checkout-container">
    <div id="checkoutMain">
      <div class="checkout-header">
        <h1>Checkout</h1>
        <p>Complete your purchase by providing shipping details</p>
      </div>

      <div class="checkout-grid">
        <div class="checkout-content">
          <form id="checkoutForm">
            <div class="checkout-section">
              <div class="section-title"><i class="fas fa-shipping-fast"></i> Shipping Details</div>
              <div class="form-grid">
                <div class="form-group">
                  <label>Full Name *</label>
                  <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                  <label>Phone Number *</label>
                  <input type="tel" id="phone_number" name="phone_number" class="form-control" placeholder="03XXXXXXXXX" required>
                </div>
                <div class="form-group full">
                  <label>Complete Address *</label>
                  <input type="text" id="address" name="address" class="form-control" placeholder="Street address, Apartment, etc." required>
                </div>
                <div class="form-group">
                  <label>City *</label>
                  <input type="text" id="city" name="city" class="form-control" placeholder="Select or type city" required>
                </div>
                <div class="form-group full">
                  <label>Additional Notes (Optional)</label>
                  <textarea id="notes" name="notes" class="form-control" rows="3" placeholder="Special instructions for the seller..."></textarea>
                </div>
              </div>
            </div>
          </form>
        </div>

        <aside class="summary-card">
          <div class="section-title" style="border:none; margin:0; padding:0; font-size:18px;">Order Summary</div>
          <div class="order-items" id="orderItems">
            <!-- Items injected here -->
          </div>
          
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="sumSubtotal">Rs 0</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span style="color:var(--secondary); font-weight:700;">Free</span>
          </div>
          <div class="summary-row summary-total">
            <span>Total Amount</span>
            <span id="sumTotal">Rs 0</span>
          </div>
          
          <button type="submit" form="checkoutForm" class="btn-place-order" id="placeOrderBtn">Place Order</button>
        </aside>
      </div>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="success-container">
      <i class="fas fa-check-circle" style="font-size:80px; color:var(--secondary); margin-bottom:24px;"></i>
      <h1 style="color:var(--primary); margin-bottom:16px;">Order Placed Successfully!</h1>
      <p style="font-size:18px; color:var(--text-muted); margin-bottom:32px;">Thank you for your purchase. The sellers have been notified and will coordinate with you.</p>
      <div style="display:flex; justify-content:center; gap:16px;">
        <a href="/home.html" class="btn btn-primary">Continue Shopping</a>
        <a href="/my-ads.html" class="btn btn-outline" style="border:1px solid var(--primary); color:var(--primary); padding:14px 24px; border-radius:4px; font-weight:700;">My Orders</a>
      </div>
    </div>
  </main>

  <div id="main-footer-placeholder"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

    let cartItems = [];

    async function initCheckout() {
      try {
        // 1. Check session
        const sessionRes = await fetch('/session');
        const session = await sessionRes.json();
        if (!session.loggedIn) {
          location.href = '/index.html?next=/checkout.html';
          return;
        }

        // 2. Load profile info for form defaults
        const profileRes = await fetch('/api/profile/me');
        const profileData = await profileRes.json();
        if (profileData.success && profileData.user) {
          document.getElementById('full_name').value = profileData.user.full_name || '';
          document.getElementById('phone_number').value = profileData.user.phone_number || '';
          document.getElementById('city').value = profileData.user.city || '';
        }

        // 3. Load cart items
        const cartRes = await fetch('/api/cart');
        const cartData = await cartRes.json();
        if (cartData.success && cartData.items.length > 0) {
          cartItems = cartData.items;
          renderSummary();
        } else {
          location.href = '/cart.html';
        }
      } catch (e) {
        console.error(e);
      }
    }

    function renderSummary() {
      const list = document.getElementById('orderItems');
      let total = 0;
      
      list.innerHTML = cartItems.map(item => {
        const img = (item.images && item.images.length) ? item.images[0] : '/assets/placeholder.jpg';
        const price = Number(item.price || 0);
        total += price;
        
        return `
          <div class="order-item">
            <img src="${esc(img)}" onerror="this.src='/assets/placeholder.jpg'">
            <div class="order-item-info">
              <div class="order-item-title">${esc(item.title)}</div>
              <div class="order-item-price">Rs ${price.toLocaleString()}</div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('sumSubtotal').textContent = `Rs ${total.toLocaleString()}`;
      document.getElementById('sumTotal').textContent = `Rs ${total.toLocaleString()}`;
    }

    document.getElementById('checkoutForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('placeOrderBtn');
      btn.disabled = true;
      btn.textContent = 'Placing Order...';

      const formData = {
        full_name: document.getElementById('full_name').value,
        phone_number: document.getElementById('phone_number').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        notes: document.getElementById('notes').value
      };

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('checkoutMain').style.display = 'none';
          document.getElementById('successMessage').style.display = 'block';
          window.scrollTo(0, 0);
        } else {
          alert(data.error || 'Failed to place order.');
          btn.disabled = false;
          btn.textContent = 'Place Order';
        }
      } catch (e) {
        alert('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Place Order';
      }
    };

    document.addEventListener('DOMContentLoaded', initCheckout);
  </script>
</body>
</html>
